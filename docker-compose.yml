services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calendario_livia_production
      POSTGRES_USER: calendario_livia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendario_livia"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5881:3000"
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      POSTGRES_HOST: db
      POSTGRES_USER: calendario_livia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CALENDARIO_LIVIA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      RAILS_LOG_TO_STDOUT: "true"
      WEB_CONCURRENCY: 2
    volumes:
      - storage:/rails/storage
    restart: unless-stopped

volumes:
  postgres_data:
  storage:
